name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Cloudflare Pages project exists
        run: |
          if ! npx wrangler pages project list | grep -q "lll-phone-util"; then
            echo "Project 'lll-phone-util' not found, creating it..."
            npx wrangler pages project create lll-phone-util --production-branch=main
          else
            echo "Project 'lll-phone-util' already exists."
          fi

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy . --project-name=lll-phone-util --branch=main
