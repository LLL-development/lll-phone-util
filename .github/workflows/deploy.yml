name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set trimmed Cloudflare credentials
        run: |
          echo "CLOUDFLARE_API_TOKEN=$(printf '%s' "${{ secrets.CLOUDFLARE_API_TOKEN }}" | tr -d '[:space:]')" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$(printf '%s' "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" | tr -d '[:space:]')" >> "$GITHUB_ENV"

      - name: Ensure Cloudflare Pages project exists
        run: |
          if ! npx wrangler pages project list | grep -q "lll-phone-util"; then
            echo "Project 'lll-phone-util' not found, creating it..."
            npx wrangler pages project create lll-phone-util --production-branch=main
          else
            echo "Project 'lll-phone-util' already exists."
          fi

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy . --project-name=lll-phone-util --branch=main
