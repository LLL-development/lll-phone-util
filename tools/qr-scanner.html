<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0d12" />
<title>QR Scanner</title>
<script>(function(){try{var t=localStorage.getItem('ptk_theme');if(!t){t=(window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="icon" type="image/svg+xml" href="../lllLogo.svg" />
<link rel="manifest" href="../manifest.json" />
<link rel="apple-touch-icon" href="../icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="app">
  <div class="tool-header">
    <a class="back-btn" href="../index.html">←</a>
    <h2><span>🔳</span> <span data-i18n="qrScanner.header">QR Scanner</span></h2>
    <div class="top-controls">
      <button id="themeToggle" class="icon-btn" data-i18n-aria="common.toggleTheme" aria-label="Toggle theme">🌙</button>
      <select id="langSelect" class="lang-select" data-i18n-aria="common.language" aria-label="Language"></select>
    </div>
  </div>

  <div class="tool-body">
    <div id="status" class="status">Tap "Start Camera" to scan a QR code.</div>

    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" class="hidden"></canvas>
    </div>

    <button id="startBtn" class="btn" data-i18n="qrScanner.startBtn">Start Camera</button>

    <div id="resultPanel" class="panel hidden">
      <label data-i18n="qrScanner.resultLabel">Decoded Result</label>
      <div id="resultBox" class="result-box"></div>
      <div class="btn-row" style="margin-top:12px;">
        <button id="openBtn" class="btn hidden" data-i18n="qrScanner.openBtn">Open Link</button>
        <button id="copyBtn" class="btn secondary" data-i18n="qrScanner.copyBtn">Copy</button>
        <button id="scanAgainBtn" class="btn secondary" data-i18n="qrScanner.scanAgainBtn">Scan Again</button>
      </div>
    </div>

    <div class="panel hint" data-i18n="qrScanner.hint">
      Decoding happens locally in your browser (jsQR, loaded from a CDN). Point your rear camera at a QR code and hold steady.
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/i18n.js"></script>
<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const startBtn = document.getElementById('startBtn');
const statusEl = document.getElementById('status');
const resultPanel = document.getElementById('resultPanel');
const resultBox = document.getElementById('resultBox');
const openBtn = document.getElementById('openBtn');
const copyBtn = document.getElementById('copyBtn');
const scanAgainBtn = document.getElementById('scanAgainBtn');

let stream = null;
let scanning = false;
let rafId = null;
let statusState = { key: 'qrScanner.statusInit', cls: '', extra: '' };

function renderStatus() {
  statusEl.textContent = Ptk.t(statusState.key) + (statusState.extra || '');
  statusEl.className = 'status' + (statusState.cls ? ' ' + statusState.cls : '');
}

function setStatus(key, cls, extra) {
  statusState = { key: key, cls: cls || '', extra: extra || '' };
  renderStatus();
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    resultPanel.classList.add('hidden');
    startBtn.classList.add('hidden');
    scanning = true;
    setStatus('qrScanner.scanning', 'ok');
    tick();
  } catch (err) {
    setStatus('common.cameraFailed', 'warn', ' ' + err.message);
  }
}

function tick() {
  if (!scanning) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA && typeof jsQR !== 'undefined') {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
    if (code && code.data) {
      onDecoded(code.data);
      return;
    }
  }
  rafId = requestAnimationFrame(tick);
}

function onDecoded(text) {
  scanning = false;
  if (navigator.vibrate) navigator.vibrate(120);
  resultBox.textContent = text;
  resultPanel.classList.remove('hidden');
  const isUrl = /^https?:\/\//i.test(text.trim());
  openBtn.classList.toggle('hidden', !isUrl);
  openBtn.onclick = () => {
    const win = window.open(text, '_blank', 'noopener,noreferrer');
    if (win) win.opener = null;
  };
  setStatus('qrScanner.detected', 'ok');
  stopCamera();
}

function stopCamera() {
  if (rafId) cancelAnimationFrame(rafId);
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

function handleBackgrounded() {
  if (!scanning) return;
  scanning = false;
  stopCamera();
  startBtn.classList.remove('hidden');
  setStatus('qrScanner.statusInit', '');
}

startBtn.addEventListener('click', startCamera);

scanAgainBtn.addEventListener('click', () => {
  resultPanel.classList.add('hidden');
  startCamera();
});

copyBtn.addEventListener('click', async () => {
  await navigator.clipboard.writeText(resultBox.textContent);
  setStatus('common.copied', 'ok');
});

document.addEventListener('visibilitychange', () => { if (document.hidden) handleBackgrounded(); });
window.addEventListener('pagehide', stopCamera);
window.addEventListener('beforeunload', stopCamera);

if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
  setStatus('common.cameraNotSupported', 'warn');
  startBtn.disabled = true;
}

document.addEventListener('ptk-lang-changed', renderStatus);
</script>
</body>
</html>
