<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0d12" />
<title>Password Generator</title>
<script>(function(){try{var t=localStorage.getItem('ptk_theme');if(!t){t=(window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="icon" type="image/svg+xml" href="../lllLogo.svg" />
<link rel="manifest" href="../manifest.json" />
<link rel="apple-touch-icon" href="../icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="app">
  <div class="tool-header">
    <a class="back-btn" href="../index.html">←</a>
    <h2><span>🔑</span> <span data-i18n="passwordGenerator.header">Password Generator</span></h2>
    <div class="top-controls">
      <button id="themeToggle" class="icon-btn" data-i18n-aria="common.toggleTheme" aria-label="Toggle theme">🌙</button>
      <select id="langSelect" class="lang-select" data-i18n-aria="common.language" aria-label="Language"></select>
    </div>
  </div>

  <div class="tool-body">
    <div id="status" class="status">Choose your options and tap Generate.</div>

    <div class="field">
      <label><span data-i18n="passwordGenerator.lengthLabel">Length</span>: <span id="lengthVal">16</span></label>
      <input id="lengthInput" type="range" min="4" max="64" step="1" value="16" />
    </div>

    <div class="field">
      <label style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <input id="uppercaseCheck" type="checkbox" checked style="width:18px;height:18px;" />
        <span data-i18n="passwordGenerator.uppercaseLabel">Uppercase (A-Z)</span>
      </label>
      <label style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <input id="lowercaseCheck" type="checkbox" checked style="width:18px;height:18px;" />
        <span data-i18n="passwordGenerator.lowercaseLabel">Lowercase (a-z)</span>
      </label>
      <label style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <input id="numbersCheck" type="checkbox" checked style="width:18px;height:18px;" />
        <span data-i18n="passwordGenerator.numbersLabel">Numbers (0-9)</span>
      </label>
      <label style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <input id="symbolsCheck" type="checkbox" style="width:18px;height:18px;" />
        <span data-i18n="passwordGenerator.symbolsLabel">Symbols (!@#$…)</span>
      </label>
      <label style="display:flex;align-items:center;gap:10px;margin-bottom:0;">
        <input id="excludeAmbiguousCheck" type="checkbox" style="width:18px;height:18px;" />
        <span data-i18n="passwordGenerator.excludeAmbiguousLabel">Exclude ambiguous characters (l, 1, I, O, 0)</span>
      </label>
    </div>

    <button id="generateBtn" class="btn" data-i18n="passwordGenerator.generateBtn">🎲 Generate Password</button>

    <div id="resultPanel" class="panel hidden">
      <div id="resultBox" class="result-box" style="font-size:18px;word-break:break-all;"></div>
      <div id="strengthLabel" class="status" style="margin-top:10px;"></div>
      <div class="btn-row" style="margin-top:12px;">
        <button id="copyBtn" class="btn secondary" data-i18n="passwordGenerator.copyBtn">Copy</button>
        <button id="shareBtn" class="btn secondary hidden" data-i18n="common.shareBtn">📤 Share</button>
      </div>
    </div>

    <div class="panel hint" data-i18n="passwordGenerator.hint">
      Generates passwords locally using your browser's secure random number generator (crypto.getRandomValues) — nothing is sent anywhere.
    </div>
  </div>
</div>

<script src="../js/theme.js"></script>
<script src="../js/i18n.js"></script>
<script>
const lengthInput = document.getElementById('lengthInput');
const lengthVal = document.getElementById('lengthVal');
const uppercaseCheck = document.getElementById('uppercaseCheck');
const lowercaseCheck = document.getElementById('lowercaseCheck');
const numbersCheck = document.getElementById('numbersCheck');
const symbolsCheck = document.getElementById('symbolsCheck');
const excludeAmbiguousCheck = document.getElementById('excludeAmbiguousCheck');
const generateBtn = document.getElementById('generateBtn');
const resultPanel = document.getElementById('resultPanel');
const resultBox = document.getElementById('resultBox');
const strengthLabel = document.getElementById('strengthLabel');
const copyBtn = document.getElementById('copyBtn');
const shareBtn = document.getElementById('shareBtn');
const statusEl = document.getElementById('status');

const AMBIGUOUS_CHARS = 'l1IO0';

const CHARSETS = {
  uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lowercase: 'abcdefghijklmnopqrstuvwxyz',
  numbers: '0123456789',
  symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
};

let statusState = { key: 'passwordGenerator.statusInit', cls: '', extra: '' };
let strengthState = null;

function renderStatus() {
  statusEl.textContent = Ptk.t(statusState.key) + (statusState.extra || '');
  statusEl.className = 'status' + (statusState.cls ? ' ' + statusState.cls : '');
}

function setStatus(key, cls, extra) {
  statusState = { key: key, cls: cls || '', extra: extra || '' };
  renderStatus();
}

function renderStrength() {
  if (!strengthState) return;
  strengthLabel.textContent = Ptk.t(strengthState.key);
  strengthLabel.className = 'status' + (strengthState.cls ? ' ' + strengthState.cls : '');
}

lengthInput.addEventListener('input', () => { lengthVal.textContent = lengthInput.value; });

function updateStrength(length, poolSize) {
  const entropy = length * Math.log2(poolSize || 1);
  if (entropy < 40) strengthState = { key: 'passwordGenerator.strengthWeak', cls: 'warn' };
  else if (entropy < 60) strengthState = { key: 'passwordGenerator.strengthFair', cls: '' };
  else if (entropy < 80) strengthState = { key: 'passwordGenerator.strengthGood', cls: 'ok' };
  else strengthState = { key: 'passwordGenerator.strengthStrong', cls: 'ok' };
  renderStrength();
}

generateBtn.addEventListener('click', () => {
  let chars = '';
  if (uppercaseCheck.checked) chars += CHARSETS.uppercase;
  if (lowercaseCheck.checked) chars += CHARSETS.lowercase;
  if (numbersCheck.checked) chars += CHARSETS.numbers;
  if (symbolsCheck.checked) chars += CHARSETS.symbols;

  if (excludeAmbiguousCheck.checked) {
    chars = chars.split('').filter(c => !AMBIGUOUS_CHARS.includes(c)).join('');
  }

  if (!chars) {
    setStatus('passwordGenerator.selectOneType', 'warn');
    return;
  }

  const length = parseInt(lengthInput.value, 10);
  const randomValues = new Uint32Array(length);
  crypto.getRandomValues(randomValues);
  let password = '';
  for (let i = 0; i < length; i++) {
    password += chars[randomValues[i] % chars.length];
  }

  resultBox.textContent = password;
  resultPanel.classList.remove('hidden');
  updateStrength(length, chars.length);
  setStatus('passwordGenerator.statusGenerated', 'ok');
});

copyBtn.addEventListener('click', async () => {
  if (!resultBox.textContent) return;
  await navigator.clipboard.writeText(resultBox.textContent);
  setStatus('common.copied', 'ok');
});

if (navigator.share) {
  shareBtn.classList.remove('hidden');
  shareBtn.addEventListener('click', async () => {
    if (!resultBox.textContent) return;
    try {
      await navigator.share({ text: resultBox.textContent });
    } catch (err) {
      if (err.name !== 'AbortError') setStatus('common.shareFailed', 'warn', ' ' + err.message);
    }
  });
}

document.addEventListener('ptk-lang-changed', () => { renderStatus(); renderStrength(); });
</script>
</body>
</html>
