<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0d12" />
<title>QR Code Generator</title>
<script>(function(){try{var t=localStorage.getItem('ptk_theme');if(!t){t=(window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="icon" type="image/svg+xml" href="../lllLogo.svg" />
<link rel="manifest" href="../manifest.json" />
<link rel="apple-touch-icon" href="../icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="app">
  <div class="tool-header">
    <a class="back-btn" href="../index.html">←</a>
    <h2><span>🔲</span> <span data-i18n="qrGenerator.header">QR Code Generator</span></h2>
    <div class="top-controls">
      <button id="themeToggle" class="icon-btn" data-i18n-aria="common.toggleTheme" aria-label="Toggle theme">🌙</button>
      <select id="langSelect" class="lang-select" data-i18n-aria="common.language" aria-label="Language"></select>
    </div>
  </div>

  <div class="tool-body">
    <div id="status" class="status">Type text or a URL, then generate a QR code.</div>

    <div class="field">
      <label data-i18n="qrGenerator.textLabel">Text or URL</label>
      <textarea id="input" rows="4" data-i18n-placeholder="qrGenerator.textPlaceholder" placeholder="Type or paste text, a link, Wi-Fi info, etc…"></textarea>
    </div>

    <button id="generateBtn" class="btn" data-i18n="qrGenerator.generateBtn">Generate QR Code</button>

    <div id="qrWrap" class="center hidden" style="padding:8px 0;">
      <img id="qrImg" style="max-width:220px;width:100%;margin:0 auto;background:#fff;padding:14px;border-radius:14px;display:block;" />
    </div>

    <div id="resultControls" class="btn-row hidden">
      <button id="downloadBtn" class="btn secondary" data-i18n="qrGenerator.downloadBtn">Save Image</button>
      <button id="copyBtn" class="btn secondary" data-i18n="qrGenerator.copyBtn">Copy Text</button>
      <button id="shareBtn" class="btn secondary hidden" data-i18n="common.shareBtn">📤 Share</button>
      <button id="clearBtn" class="btn secondary" data-i18n="qrGenerator.clearBtn">Clear</button>
    </div>

    <div class="panel hint" data-i18n="qrGenerator.hint">
      Generates a QR code entirely on-device using the qrcode-generator library (loaded from a CDN). Works offline afterwards — great for sharing links, Wi-Fi passwords, or contact info.
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/i18n.js"></script>
<script>
const input = document.getElementById('input');
const generateBtn = document.getElementById('generateBtn');
const qrWrap = document.getElementById('qrWrap');
const qrImg = document.getElementById('qrImg');
const resultControls = document.getElementById('resultControls');
const downloadBtn = document.getElementById('downloadBtn');
const copyBtn = document.getElementById('copyBtn');
const shareBtn = document.getElementById('shareBtn');
const clearBtn = document.getElementById('clearBtn');
const statusEl = document.getElementById('status');

let statusState = { key: 'qrGenerator.statusInit', cls: '', extra: '' };

function renderStatus() {
  statusEl.textContent = Ptk.t(statusState.key) + (statusState.extra || '');
  statusEl.className = 'status' + (statusState.cls ? ' ' + statusState.cls : '');
}

function setStatus(key, cls, extra) {
  statusState = { key: key, cls: cls || '', extra: extra || '' };
  renderStatus();
}

generateBtn.addEventListener('click', () => {
  const text = input.value.trim();
  if (!text) {
    setStatus('qrGenerator.enterTextFirst', 'warn');
    return;
  }
  if (typeof qrcode === 'undefined') {
    setStatus('qrGenerator.engineNotLoaded', 'warn');
    return;
  }
  try {
    const qr = qrcode(0, 'M');
    qr.addData(text);
    qr.make();
    qrImg.src = qr.createDataURL(8, 8);
    qrWrap.classList.remove('hidden');
    resultControls.classList.remove('hidden');
    setStatus('qrGenerator.statusGenerated', 'ok');
  } catch (err) {
    setStatus('qrGenerator.tooLong', 'warn');
  }
});

downloadBtn.addEventListener('click', () => {
  const a = document.createElement('a');
  a.href = qrImg.src;
  a.download = 'qr-code-' + Date.now() + '.gif';
  a.click();
});

copyBtn.addEventListener('click', async () => {
  if (!input.value) return;
  await navigator.clipboard.writeText(input.value);
  setStatus('common.copied', 'ok');
});

let canShareImage = false;
if (navigator.share && navigator.canShare) {
  try {
    canShareImage = navigator.canShare({ files: [new File([''], 'test.png', { type: 'image/png' })] });
  } catch (err) {
    canShareImage = false;
  }
}

if (canShareImage) {
  shareBtn.classList.remove('hidden');
  shareBtn.addEventListener('click', async () => {
    try {
      const res = await fetch(qrImg.src);
      const blob = await res.blob();
      const file = new File([blob], 'qr-code.gif', { type: blob.type });
      await navigator.share({ files: [file], title: 'QR Code' });
    } catch (err) {
      if (err.name !== 'AbortError') setStatus('common.shareFailed', 'warn', ' ' + err.message);
    }
  });
}

clearBtn.addEventListener('click', () => {
  input.value = '';
  qrWrap.classList.add('hidden');
  resultControls.classList.add('hidden');
  setStatus('qrGenerator.statusInit', '');
});

document.addEventListener('ptk-lang-changed', renderStatus);
</script>
</body>
</html>
